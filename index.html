<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uru Music Player</title>
    <style>
        #container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 50px;
        }

        .audio-player {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 10px;
        }

        #name {
            height: 50px;
            font-size: 18px;
            font-weight: bold;
        }

        #timeDisplay {
            font-size: 16px;
            color: #333;
        }
 
        #seekBar {
            width: 100%;
            background: #ddd;
        }

        #volumeBar {
            width: 200px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 5px;
            border-radius: 5px;
            background: #ddd;
            opacity: 0.7;
            transition: opacity .2s;
        }

        input[type="range"]:hover {
            opacity: 1;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
        }

        button {
            border: none;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <audio id="myAudio">
        <source src="" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <div id="container">
        <div id="name"></div>
        <div class="audio-player">
            <button id="playBtn" onclick="play()">
                <img id="playImg" src="img/play.png" width="20">
            </button>
            <span id="timeDisplay">0:00</span>
            <input type="range" id="seekBar" min="0" value="0">
            <button id="volumeBtn" onclick="mute()">
                <img id="volumeImg" src="img/high-volume.png" width="20">
            </button>
            <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="0.03">
        </div>
        <div class="audio-player">
            <button id="prevBtn" disabled onclick="back()" style="cursor: default;">
                <img id="prevImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" alt="Previous" width="20">
            </button>
            <button id="nextBtn" onclick="next()">
                <img src="img/next.png" alt="Next" width="20">
            </button>
            <button id="loopBtn" onclick="loop()">
                <img id="loopImg" src="img/loop.png" style="opacity: 0.3;" width="20">
            </button>
            <button onclick="shuffle()">
                <img id="shuffleImg" src="img/shuffle.png" width="20">
            </button>
        </div>
    </div>

    <script src="playlist.js"></script>
    <script>
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');
        const playImg = document.getElementById('playImg');
        const timeDisplay = document.getElementById('timeDisplay');
        const seekBar = document.getElementById('seekBar');
        const volumeBtn = document.getElementById('volumeBtn');
        const volumeImg = document.getElementById('volumeImg');
        const volumeBar = document.getElementById('volumeBar');
        const prevBtn = document.getElementById('prevBtn');
        const prevImg = document.getElementById('prevImg');
        const loopImg = document.getElementById('loopImg');
        const shuffleImg = document.getElementById('shuffleImg');

        let lastSong = 0;
        let thisSong = 0;
        let lastVolume = volumeBar.value;
        let loopMode = false;
        let shuffleMode = true;

        function play(){
            if (audio.paused) {
                audio.play();
                playImg.src = "img/pause.png";
            } else {
                audio.pause();
                playImg.src = "img/play.png";
            }
        }

        function setslider() {
            const percent = seekBar.value / (seekBar.max - seekBar.min) * 100;
            seekBar.style.background = 
            `linear-gradient(to right, #e81818 ${percent}%, #ddd ${percent}% 100%)`;
        }

        // Update current time display
        audio.addEventListener('timeupdate', () => {
            const minutes = Math.floor(audio.currentTime / 60);
            const seconds = Math.floor(audio.currentTime % 60).toString().padStart(2, '0');
            timeDisplay.textContent = `${minutes}:${seconds}`;
            seekBar.value = audio.currentTime;
            setslider();
        });

        // Seek audio
        seekBar.addEventListener('input', () => {
            audio.currentTime = seekBar.value;
            setslider();
        });

        // Set maximum for seek bar after metadata loads
        audio.addEventListener('loadedmetadata', () => {
            seekBar.max = audio.duration;
        });

        function mute(){
            if (audio.volume > 0) {
                lastVolume = audio.volume;
                audio.volume = 0;
                volumeBar.value = 0;
                volumeImg.src = "img/silent.png";
            } else {
                audio.volume = lastVolume > 0 ? lastVolume : 0.03;
                volumeBar.value = lastVolume > 0 ? lastVolume : 0.03;
                volumeImg.src = "img/high-volume.png";
            }
        }


        // Control volume
        volumeBar.addEventListener('input', () => {
            lastVolume = volumeBar.value;
            audio.volume = lastVolume;
            volumeImg.src = lastVolume > 0 ? "img/high-volume.png" : "img/silent.png";
        });

        function setName() {
            document.getElementById('name').innerText = list[thisSong][3];
        }

        function startPlaying() {
            setName();
            audio.src = `uru_cover/${list[thisSong][0]}.mp3`;
            audio.play();
            playImg.src = "img/pause.png";
        }

        function back() {
            console.log('Previous button clicked');
            if (thisSong !== lastSong) {
                thisSong = lastSong;
                startPlaying();
                prevBtn.disabled = true;
                prevBtn.style.cursor = 'default';
                prevImg.src = "data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==";
            }
        }

        function randomChoose() {
            thisSong = Math.floor(Math.random() * list.length);
        }

        function next() {
            lastSong = thisSong;
            do {
                randomChoose();
            } while (thisSong === lastSong);
            startPlaying();
            prevBtn.disabled = false;
            prevBtn.style.cursor = 'pointer';
            prevImg.src = "img/back.png";
        }

        function loop() {
            loopMode = !loopMode;
            audio.loop = loopMode;
            loopImg.style.opacity = loopMode ? '1' : '0.3';
        }

        function shuffle() {
            shuffleMode = !shuffleMode;
            shuffleImg.style.opacity = shuffleMode ? '1' : '0.3';
        }

        audio.addEventListener('ended', () => {
            if (shuffleMode){
                next();
            }
            else {
                playImg.src = "img/play.png";
            }
        });

        audio.volume = volumeBar.value;
        randomChoose();
        setName();
        audio.src = `uru_cover/${list[thisSong][0]}.mp3`;
    </script>
</body>
</html>
